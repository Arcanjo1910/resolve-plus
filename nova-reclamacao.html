<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Reclamação | Resolve+</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <nav class="navbar">
    <h1>Resolve+</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="nova-reclamacao.html">Nova Reclamação</a></li>
      <li><a href="reclamacoes.html">Reclamações</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="estatisticas.html">Estatísticas</a></li>
      <li><a href="sobre.html">Sobre</a></li>
    </ul>
  </nav>
</header>

<main class="page-container">
  <section class="page-title">
    <span class="tag">Cadastro Inteligente</span>
    <h2>Registrar Nova Reclamação</h2>
    <p>Preencha os dados abaixo para registrar uma reclamação no sistema.</p>
  </section>

  <p id="mensagemSucesso" class="success-message">
  Reclamação registrada com sucesso!
  </p>

  <form class="form-card">
    <input type="text" placeholder="Nome do cliente">
    <input type="email" placeholder="E-mail do cliente">

    <select>
      <option value="" disabled selected>
        Selecione uma categoria
      </option>
      <option value="Entrega">📦 Entrega</option>
      <option value="Atendimento">🎧 Atendimento</option>
      <option value="Produto">🛒 Produto</option>
      <option value="Pagamento">💳 Pagamento</option>
      <option value="Suporte Técnico">🛠️ Suporte Técnico</option>
    </select>

    <input type="text" id="cep" placeholder="Digite o CEP">
    <input type="text" id="rua" placeholder="Rua">
    <input type="text" id="bairro" placeholder="Bairro">
    <input type="text" id="cidade" placeholder="Cidade">
    <input type="text" id="estado" placeholder="Estado">

    <textarea placeholder="Descreva a reclamação"></textarea>

    <button type="button" class="btn primary" id="btnRegistrar"> 
      Registrar Reclamação 
    </button>
  </form>
</main>

<script src="script.js"></script>
</body>
</html>]
